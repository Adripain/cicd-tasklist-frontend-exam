# Projet
sonar.projectKey=tasklist-frontend-exam
sonar.projectName=TaskList Frontend Exam

# Serveur SonarQube
sonar.host.url=https://sonarqube.cicd.kits.ext.educentre.fr

# Sources
sonar.sources=src

# Tests
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.ts,src/__tests__/**/*.tsx

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,reports/**,**/*.config.ts,**/*.config.js
sonar.test.exclusions=node_modules/**,dist/**
sonar.coverage.exclusions=src/main.tsx,src/__tests__/**

# Couverture de tests TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8

# Duplication
sonar.cpd.exclusions=src/__tests__/**
